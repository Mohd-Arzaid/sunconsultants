# Add inside your server { } block, above the SPA fallback location.
# Assumes root points at the uploaded dist/ directory.

location = / {
    try_files /home/index.html /index.html;
}

location = /what-is-bis-certificate-indian-bis {
    try_files /what-is-bis-certificate-indian-bis/index.html /index.html;
}

location = /a-guide-to-bis-certification-indian-bis {
    try_files /a-guide-to-bis-certification-indian-bis/index.html /index.html;
}

location = /a-guide-to-bis-certification-for-foreign-manufacturers-indian-bis {
    try_files /a-guide-to-bis-certification-for-foreign-manufacturers-indian-bis/index.html /index.html;
}

location = /what-is-crs-bis-or-crs-registration {
    try_files /what-is-crs-bis-or-crs-registration/index.html /index.html;
}

location = /indian-bis-certification-under-scheme-x {
    try_files /indian-bis-certification-under-scheme-x/index.html /index.html;
}

location / {
    try_files $uri $uri/ /index.html;
}
